<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cantina Digital</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        :root {
            --senna-red: #E60000;
            --senna-yellow: #FFD700;
            --asphalt-dark: #0f0f11;
            --carbon-fiber: #1a1a1d;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--asphalt-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Pattern */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%), 
                linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%), 
                linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.03) 75%);
            background-size: 40px 40px;
            z-index: -1;
            animation: bgScroll 20s linear infinite;
        }

        @keyframes bgScroll {
            from { background-position: 0 0, 0 20px, 20px -20px, -20px 0px; }
            to { background-position: 40px 40px, 40px 60px, 60px 20px, 20px 40px; }
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            perspective: 1000px;
        }

        .login-card {
            background: rgba(26, 26, 29, 0.8);
            backdrop-filter: blur(20px);
            padding: 3rem 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform-style: preserve-3d;
            opacity: 0; /* For GSAP */
            transform: translateY(20px);
        }

        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-icon {
            font-size: 3rem;
            display: inline-block;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 15px rgba(230, 0, 0, 0.5));
        }

        .brand h1 {
            font-family: 'Racing Sans One', cursive;
            font-size: 2rem;
            background: linear-gradient(135deg, #fff 0%, #ccc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .brand p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--senna-red);
            box-shadow: 0 0 0 4px rgba(230, 0, 0, 0.1);
            background: rgba(0,0,0,0.5);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .input-group input:focus + .input-icon {
            color: var(--senna-red);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--senna-red), #b91c1c);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Racing Sans One', cursive;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(230, 0, 0, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 0, 0, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: var(--senna-yellow);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            display: none;
            text-align: center;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
        }

        .modal-content {
            background: var(--carbon-fiber);
            padding: 2rem;
            border-radius: 16px;
            width: 90%;
            max-width: 350px;
            border: 1px solid rgba(255,255,255,0.1);
            transform: scale(0.9);
        }

        .modal h3 {
            color: white;
            margin-bottom: 1rem;
            font-family: 'Racing Sans One', cursive;
        }

        .modal p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.75rem;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">🏎️</div>
                <h1>Cantina Digital</h1>
                <p>Acesso Administrativo</p>
            </div>

            <form id="loginForm">
                <div id="errorMessage" class="error-message"></div>

                <div class="input-group">
                    <input type="text" id="usuario" placeholder="Usuário" required autocomplete="off">
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>

                <div class="input-group">
                    <input type="password" id="senha" placeholder="Senha" required>
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>

                <button type="submit" class="btn-login">
                    Acessar Painel
                </button>

                <a href="#" class="forgot-link" id="forgotBtn">Esqueci minha senha</a>
            </form>
        </div>
    </div>

    <!-- Modal Recuperação -->
    <div id="recoveryModal" class="modal">
        <div class="modal-content">
            <h3>Recuperar Senha</h3>
            <p>Digite seu e-mail para receber as instruções de recuperação.</p>
            
            <div class="input-group">
                <input type="email" id="recoveryEmail" placeholder="seu@email.com" required>
                <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </div>

            <button id="sendRecovery" class="btn-login" style="margin-top: 0;">Enviar</button>
            <button id="closeRecovery" class="btn-secondary">Cancelar</button>
        </div>
    </div>

    <script src="login-script.js"></script>
    <script>
        // Animações de Entrada
        document.addEventListener('DOMContentLoaded', () => {
            gsap.to('.login-card', {
                opacity: 1,
                y: 0,
                duration: 1,
                ease: 'power3.out'
            });

            gsap.from('.brand-icon', {
                scale: 0,
                rotation: -180,
                duration: 0.8,
                delay: 0.3,
                ease: 'back.out(1.7)'
            });

            gsap.from('.input-group', {
                opacity: 0,
                x: -20,
                duration: 0.5,
                stagger: 0.1,
                delay: 0.6
            });
        });
    </script>
</body>
</html>
